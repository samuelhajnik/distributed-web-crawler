global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: control-plane
    metrics_path: /metrics
    static_configs:
      - targets:
          - control-plane:3000

  - job_name: worker
    metrics_path: /metrics
    static_configs:
      - targets:
          - worker:9091
